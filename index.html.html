<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 Basketball Squares</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --court:#c8500a; --gold:#f5c842; --bg:#0d0d0d; --surface:#1a1a1a;
  --surface2:#242424; --border:#333; --text:#f0ede8; --text-dim:#888;
  --win:#22c55e; --win-glow:rgba(34,197,94,0.3);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

/* TOP HEADER */
.top-bar{background:linear-gradient(135deg,#1a0a00,#2d1200,#1a0a00);border-bottom:2px solid var(--court);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--gold);letter-spacing:2px;}
.logo span{color:var(--court);}
.top-bar-right{margin-left:auto;font-size:0.8rem;color:var(--text-dim);}

/* GAME TABS BAR (bottom) */
.game-tabs-bar{background:#111;border-top:2px solid var(--border);padding:0 12px;display:flex;align-items:stretch;gap:0;flex-shrink:0;overflow-x:auto;min-height:46px;}
.game-tab{display:flex;align-items:center;gap:7px;padding:0 16px;border:none;background:transparent;color:var(--text-dim);font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.82rem;cursor:pointer;border-top:2px solid transparent;transition:all 0.18s;white-space:nowrap;border-bottom:none;margin-top:2px;}
.game-tab.active{color:var(--text);border-top:2px solid var(--court);background:#1a1a1a;}
.game-tab:hover:not(.active){color:var(--text);background:#181818;}
.game-tab .tab-close{color:var(--text-dim);font-size:0.85rem;padding:1px 3px;border-radius:3px;line-height:1;}
.game-tab .tab-close:hover{color:#e74c3c;background:rgba(231,76,60,0.15);}
.add-game-btn{display:flex;align-items:center;padding:0 14px;color:var(--court);font-size:1.3rem;cursor:pointer;border:none;background:transparent;border-top:2px solid transparent;margin-top:2px;}
.add-game-btn:hover{color:var(--gold);}

/* MAIN CONTENT */
.main{flex:1;overflow-y:auto;}
.game-view{display:none;height:100%;}
.game-view.active{display:flex;flex-direction:column;}

/* INNER TABS (Setup / Grid / Scores / History) */
.inner-tabs{display:flex;gap:4px;background:var(--surface2);padding:4px 20px;border-bottom:1px solid var(--border);}
.inner-tab{padding:7px 16px;border-radius:7px;border:none;background:transparent;color:var(--text-dim);font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.82rem;cursor:pointer;transition:all 0.18s;}
.inner-tab.active{background:var(--court);color:white;}
.inner-tab:hover:not(.active){color:var(--text);background:var(--surface);}

.inner-panel{display:none;padding:18px 20px;max-width:960px;margin:0 auto;width:100%;}
.inner-panel.active{display:block;}

/* CARDS / FORMS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;}
.card h3{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:1px;color:var(--gold);margin-bottom:10px;}
label{font-size:0.8rem;color:var(--text-dim);display:block;margin-bottom:3px;}
input[type=text],input[type=number],select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.87rem;margin-bottom:8px;outline:none;transition:border 0.2s;}
input:focus,select:focus{border-color:var(--court);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;border:none;font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.85rem;cursor:pointer;transition:all 0.18s;}
.btn-primary{background:var(--court);color:white;}.btn-primary:hover{background:#d95a0c;transform:translateY(-1px);}
.btn-gold{background:var(--gold);color:#111;}.btn-gold:hover{background:#f0c030;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-dim);}.btn-ghost:hover{border-color:var(--court);color:var(--text);}
.btn-danger{background:transparent;border:1px solid #c0392b;color:#e57373;}.btn-danger:hover{background:#c0392b;color:white;}
.btn-sm{padding:5px 11px;font-size:0.77rem;}
.btn-full{width:100%;justify-content:center;}
.flex{display:flex;}.gap-2{gap:8px;}.wrap{flex-wrap:wrap;}.items-center{align-items:center;}.justify-between{justify-content:space-between;}
.mt-2{margin-top:8px;}.mt-3{margin-top:12px;}
.divider{border:none;border-top:1px solid var(--border);margin:12px 0;}
small{font-size:0.72rem;color:var(--text-dim);}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;color:var(--text);margin-bottom:12px;}

/* PLAYERS */
.names-list{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;min-height:30px;}
.name-tag{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px 3px 11px;font-size:0.78rem;display:flex;align-items:center;gap:5px;}
.name-tag button{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:0.82rem;padding:0;line-height:1;}
.name-tag button:hover{color:#e74c3c;}

/* PAIR CHIPS */
.pair-legend{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.pair-chip{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:4px 9px;font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:1px;color:var(--gold);}

/* GRID */
.grid-scroll{overflow-x:auto;padding-bottom:8px;}
.grid-wrap{display:inline-block;}
.grid-row{display:flex;}
.gc-corner{width:110px;height:110px;flex-shrink:0;display:flex;align-items:flex-end;justify-content:flex-end;padding:6px 8px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
.gc-col{width:100px;height:58px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;border-left:1px solid var(--border);border-bottom:1px solid var(--border);background:#110800;}
.gc-col .pm{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--gold);letter-spacing:1px;line-height:1;}
.gc-col .ps{font-size:0.6rem;color:var(--text-dim);margin-top:1px;}
.gc-row{width:110px;height:100px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid var(--border);border-top:1px solid var(--border);background:#110800;}
.gc-row .pm{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--gold);letter-spacing:1px;line-height:1;}
.gc-row .ps{font-size:0.6rem;color:var(--text-dim);margin-top:1px;}
.team-lbl-row{font-family:'Bebas Neue',sans-serif;font-size:0.88rem;letter-spacing:2px;color:var(--court);display:flex;align-items:center;justify-content:center;height:26px;}
.sq{width:100px;height:100px;flex-shrink:0;border-left:1px solid #262626;border-top:1px solid #262626;display:flex;align-items:center;justify-content:center;font-size:0.73rem;font-weight:600;text-align:center;cursor:pointer;transition:background 0.12s,border-color 0.12s;position:relative;overflow:hidden;background:var(--surface);word-break:break-word;padding:6px;line-height:1.3;color:var(--text);}
.sq:hover{background:#232323;border-color:var(--court);z-index:2;}
.sq.taken{background:#1c1c1c;}
.sq.winner{background:linear-gradient(135deg,#053318,#085c28)!important;border-color:var(--win)!important;box-shadow:0 0 20px var(--win-glow);z-index:3;animation:pw 1.8s infinite;}
.sq.prev-winner{background:#172217!important;border-color:#2a5a2a!important;}
@keyframes pw{0%,100%{box-shadow:0 0 18px var(--win-glow);}50%{box-shadow:0 0 32px rgba(34,197,94,.5);}}
.sq-trophy{position:absolute;top:3px;right:4px;font-size:0.7rem;}

/* SCORES */
.scores-layout{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
@media(max-width:480px){.scores-layout{grid-template-columns:1fr;}}
.score-team{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;}
.score-team-name{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;color:var(--gold);letter-spacing:1px;margin-bottom:8px;}
.score-input-row{display:flex;align-items:center;justify-content:center;gap:8px;}
.score-big{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--text);background:var(--surface2);border:2px solid var(--border);border-radius:10px;width:96px;text-align:center;outline:none;}
.score-big:focus{border-color:var(--court);}
.score-adj{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;}
.score-adj:hover{border-color:var(--court);}
.quarters{display:flex;gap:7px;justify-content:center;margin-bottom:14px;flex-wrap:wrap;}
.q-btn{padding:7px 15px;border-radius:8px;border:2px solid var(--border);background:var(--surface);color:var(--text-dim);font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:1px;cursor:pointer;transition:all 0.18s;}
.q-btn.active{border-color:var(--court);color:var(--text);background:#2d1200;}
.q-btn.done{border-color:var(--win);color:var(--win);}
.winner-banner{background:linear-gradient(135deg,#053318,#085c28);border:2px solid var(--win);border-radius:14px;padding:14px;text-align:center;margin-bottom:14px;display:none;}
.winner-banner.show{display:block;animation:si .35s ease;}
@keyframes si{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.winner-banner h2{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:2px;color:var(--win);}
.winner-banner .wname{font-family:'Bebas Neue',sans-serif;font-size:2.3rem;color:var(--gold);}
.winner-banner .wdetails{color:#90c490;font-size:0.82rem;margin-top:3px;}
.live-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:12px;font-size:0.84rem;}

/* SCORE BOT */
.bot-game-row{background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:12px;margin-bottom:8px;}
.bot-score-big{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;color:var(--gold);letter-spacing:2px;}

/* SCOREBOARD WIDGET */
.scoreboard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;}
.scoreboard-title{font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:2px;color:var(--text-dim);margin-bottom:10px;}
.sb-game{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #222;}
.sb-game:last-child{border-bottom:none;}
.sb-teams{flex:1;font-size:0.85rem;font-weight:600;}
.sb-score{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--gold);letter-spacing:1px;min-width:80px;text-align:right;}
.sb-status{font-size:0.7rem;color:var(--text-dim);min-width:60px;text-align:right;}
.sb-dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0;}
.sb-dot.live{background:var(--win);box-shadow:0 0 5px var(--win-glow);animation:pulse-dot 1.5s infinite;}
@keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:.4;}}

/* HISTORY */
.history-table{width:100%;border-collapse:collapse;font-size:0.84rem;}
.history-table th{background:var(--surface2);padding:8px 12px;text-align:left;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;color:var(--text-dim);border-bottom:1px solid var(--border);}
.history-table td{padding:8px 12px;border-bottom:1px solid #1e1e1e;}
.history-table tr:hover td{background:var(--surface2);}

.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:0.72rem;font-weight:600;}
.badge-orange{background:rgba(200,80,10,.2);color:var(--court);border:1px solid rgba(200,80,10,.3);}
.badge-green{background:rgba(34,197,94,.15);color:var(--win);border:1px solid rgba(34,197,94,.3);}
.badge-gold{background:rgba(245,200,66,.15);color:var(--gold);border:1px solid rgba(245,200,66,.3);}
.info-row{display:flex;align-items:center;gap:7px;font-size:0.82rem;color:var(--text-dim);}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--court);display:inline-block;flex-shrink:0;}
.status-dot.green{background:var(--win);box-shadow:0 0 5px var(--win-glow);}

/* MODAL */
#assignModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;width:310px;max-width:92vw;}
.modal-box h3{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;color:var(--gold);margin-bottom:8px;}

/* TOAST */
#botToast{display:none;position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#053318,#085c28);border:2px solid var(--win);border-radius:14px;padding:14px 22px;z-index:200;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.6);min-width:280px;transition:opacity .5s;}
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo">🏀 <span>Squares</span></div>
  <div class="top-bar-right" id="globalBotStatus"></div>
</div>

<div class="main" id="mainArea">
  <!-- game views injected here -->
</div>

<!-- BOTTOM GAME TABS -->
<div class="game-tabs-bar" id="gameTabsBar">
  <!-- tabs injected here -->
  <button class="add-game-btn" onclick="addGame()" title="Add new game">＋</button>
</div>

<!-- ASSIGN MODAL -->
<div id="assignModal" onclick="closeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h3>Assign Square</h3>
    <p id="modalCoords" style="font-size:0.8rem;color:var(--text-dim);margin-bottom:10px;"></p>
    <label>Select Player</label>
    <select id="modalSelect" style="margin-bottom:10px;"></select>
    <div class="flex gap-2">
      <button class="btn btn-primary btn-full" onclick="confirmAssign()">Assign</button>
      <button class="btn btn-ghost" onclick="document.getElementById('assignModal').style.display='none'">Cancel</button>
    </div>
  </div>
</div>

<div id="botToast"></div>

<script>
// ════════════════════════════════════════════════
//  CORE DATA
// ════════════════════════════════════════════════
const BASE_PAIRS = [[0,5],[1,6],[2,7],[3,8],[4,9]];
const Q_LABELS = {1:'Q1',2:'Half',3:'Q3',4:'Final'};
const BOT_INTERVAL_DEFAULT = 10; // minutes

let games = [];       // array of game objects
let activeGameId = null;
let pendingSquare = null; // {gameId, r, c}
let nextGameId = 1;

function newGame(name) {
  return {
    id: nextGameId++,
    name: name || 'Game',
    // Setup
    teamA: 'Team A',
    teamB: 'Team B',
    players: [],
    colOrder: [0,1,2,3,4],
    rowOrder: [0,1,2,3,4],
    grid: Array(5).fill(null).map(()=>Array(5).fill('')),
    // Scores
    results: [],
    currentQuarter: 1,
    // Bot
    botQuery: '',
    botRunning: false,
    botIntervalMins: BOT_INTERVAL_DEFAULT,
    botIntervalTimer: null,
    botCountdownTimer: null,
    botSecondsLeft: 0,
    botLastPeriodKey: null,
    botLastScore: null, // {scoreA, scoreB, status, period}
  };
}

function shuffle(arr){let a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function colPair(g,c){return BASE_PAIRS[g.colOrder[c]];}
function rowPair(g,r){return BASE_PAIRS[g.rowOrder[r]];}
function pairLabel(p){return p[0]+' / '+p[1];}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function getGame(id){return games.find(g=>g.id===id);}
function getActive(){return getGame(activeGameId);}

// ════════════════════════════════════════════════
//  TABS / NAVIGATION
// ════════════════════════════════════════════════
function addGame(name) {
  const g = newGame(name || `Game ${games.length+1}`);
  games.push(g);
  renderAllTabs();
  switchGame(g.id);
  return g;
}

function removeGame(id) {
  const g = getGame(id);
  if(g) stopBot(id);
  games = games.filter(x=>x.id!==id);
  if(games.length===0) addGame('Game 1');
  else {
    renderAllTabs();
    switchGame(games[games.length-1].id);
  }
}

function switchGame(id) {
  activeGameId = id;
  renderAllTabs();
  // Switch views
  document.querySelectorAll('.game-view').forEach(el=>el.classList.remove('active'));
  const view = document.getElementById('gview-'+id);
  if(view) view.classList.add('active');
  else { renderGameView(id); document.getElementById('gview-'+id).classList.add('active'); }
}

function renderAllTabs() {
  const bar = document.getElementById('gameTabsBar');
  // Remove old tabs (keep add button)
  bar.querySelectorAll('.game-tab').forEach(el=>el.remove());
  const addBtn = bar.querySelector('.add-game-btn');
  games.forEach(g => {
    const tab = document.createElement('button');
    tab.className = 'game-tab' + (g.id===activeGameId?' active':'');
    tab.innerHTML = `<span>${escHtml(g.name)}</span>${games.length>1?`<span class="tab-close" onclick="event.stopPropagation();removeGame(${g.id})">✕</span>`:''}`;
    tab.onclick = ()=>switchGame(g.id);
    bar.insertBefore(tab, addBtn);
  });
}

// ════════════════════════════════════════════════
//  GAME VIEW RENDER
// ════════════════════════════════════════════════
function renderGameView(id) {
  const g = getGame(id);
  const main = document.getElementById('mainArea');
  const div = document.createElement('div');
  div.className = 'game-view';
  div.id = 'gview-'+id;
  div.innerHTML = `
    <div class="inner-tabs" id="itabs-${id}">
      <button class="inner-tab active" onclick="switchInnerTab(${id},'setup')">Setup</button>
      <button class="inner-tab" onclick="switchInnerTab(${id},'grid')">Grid</button>
      <button class="inner-tab" onclick="switchInnerTab(${id},'scores')">Scores</button>
      <button class="inner-tab" onclick="switchInnerTab(${id},'history')">History</button>
    </div>

    <!-- SETUP -->
    <div class="inner-panel active" id="ip-${id}-setup">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div class="card">
          <h3>Game Name</h3>
          <label>Tab name</label>
          <input type="text" id="gname-${id}" value="${escHtml(g.name)}" placeholder="Auto from teams" oninput="updateGameName(${id})" onblur="if(!this.value.trim()){getGame(${id}).nameManual=false;autoTabName(${id});}">
          <label>Team A (columns)</label>
          <input type="text" id="teamA-${id}" value="${escHtml(g.teamA)}" placeholder="Lakers" oninput="syncTeams(${id})">
          <label>Team B (rows)</label>
          <input type="text" id="teamB-${id}" value="${escHtml(g.teamB)}" placeholder="Celtics" oninput="syncTeams(${id})">
        </div>
        <div class="card">
          <h3>Number Pairs</h3>
          <p style="font-size:0.8rem;color:var(--text-dim);margin-bottom:10px;">Pairs: <strong style="color:var(--gold);">0/5 · 1/6 · 2/7 · 3/8 · 4/9</strong> — randomize order before game.</p>
          <div class="flex gap-2 wrap" style="margin-bottom:10px;">
            <button class="btn btn-primary btn-sm" onclick="randomizeNums(${id})">🎲 Randomize</button>
            <button class="btn btn-ghost btn-sm" onclick="resetNums(${id})">Reset</button>
          </div>
          <label>Columns (Team A) →</label>
          <div id="colPairs-${id}" class="pair-legend"></div>
          <label style="margin-top:8px;">Rows (Team B) ↓</label>
          <div id="rowPairs-${id}" class="pair-legend"></div>
        </div>
      </div>
      <div class="card">
        <h3>Players</h3>
        <div class="flex gap-2 items-center">
          <input type="text" id="newname-${id}" placeholder="Player name" style="margin-bottom:0;flex:1;" onkeydown="if(event.key==='Enter')addPlayer(${id})">
          <button class="btn btn-primary" onclick="addPlayer(${id})">Add</button>
        </div>
        <div id="playersList-${id}" class="names-list mt-2"></div>
        <div class="divider"></div>
        <div class="flex gap-2 items-center justify-between wrap">
          <small id="sqCount-${id}">25 squares · 0 assigned</small>
          <div class="flex gap-2">
            <button class="btn btn-ghost btn-sm" onclick="clearPlayers(${id})">Clear All</button>
            <button class="btn btn-gold" onclick="autoFill(${id})">🎲 Auto-Assign Grid</button>
          </div>
        </div>
      </div>
      <div class="flex gap-2">
        <button class="btn btn-primary" onclick="switchInnerTab(${id},'grid')">Go to Grid →</button>
        ${games.length>1?`<button class="btn btn-danger btn-sm" onclick="removeGame(${id})">Delete Game</button>`:''}
      </div>
    </div>

    <!-- GRID -->
    <div class="inner-panel" id="ip-${id}-grid">
      <div class="flex gap-2 items-center justify-between wrap" style="margin-bottom:12px;">
        <p class="section-title" style="margin-bottom:0;">Board</p>
        <div class="flex gap-2 wrap">
          <button class="btn btn-ghost btn-sm" onclick="clearGrid(${id})">Clear Grid</button>

  renderPairs(id);

function switchInnerTab(id, tab) {
  const tabs = ['setup','grid','scores','history'];
  tabs.forEach((t,i) => {
    const btn = document.querySelector(`#itabs-${id} .inner-tab:nth-child(${i+1})`);
    const panel = document.getElementById(`ip-${id}-${t}`);
    if(btn) btn.classList.toggle('active', t===tab);
    if(panel) panel.classList.toggle('active', t===tab);
  });
  if(tab==='grid') renderGrid(id);
  if(tab==='scores') refreshScoreUI(id);
  if(tab==='history') renderHistory(id);
}

function abbreviateTeam(name) {
  if(!name || name === 'Team A' || name === 'Team B') return null;
  const lower = name.toLowerCase().trim();
  // Check known list first
  if(TEAM_ABBREVS[lower]) return TEAM_ABBREVS[lower];
  // Partial match
  for(const [key, abbr] of Object.entries(TEAM_ABBREVS)) {
    if(lower.includes(key) || key.includes(lower)) return abbr;
  }
  // Fallback: build abbreviation from words
  const words = name.trim().split(/\s+/);
  if(words.length === 1) {
    // Single word — take first 4-5 chars, uppercase
    return name.slice(0, Math.min(5, name.length)).toUpperCase();
  }
  // Multiple words — skip common articles, take initials or first syllables
  const skip = new Set(['the','of','at','de','university','college','state']);
  const kept = words.filter(w => !skip.has(w.toLowerCase()));
  if(kept.length === 1) return kept[0].slice(0, 5).toUpperCase();
  if(kept.length === 2) {
    // Two meaningful words: take up to 3 chars each
    return kept.map(w => w.slice(0, 3)).join('').toUpperCase();
  }
  // 3+ words: initials
  return kept.map(w => w[0]).join('').toUpperCase();
}

function autoTabName(id) {
  const g = getGame(id);
  if(g.nameManual) return; // user set it manually, don't override
  const abbA = abbreviateTeam(g.teamA);
  const abbB = abbreviateTeam(g.teamB);
  if(abbA && abbB) {
    g.name = `${abbA} vs ${abbB}`;
  } else if(abbA) {
    g.name = abbA;
  } else {
    return; // not enough info yet
  }
  // Keep the name input in sync
  const nameEl = document.getElementById('gname-'+id);
  if(nameEl) nameEl.value = g.name;
  renderAllTabs();
}

function syncTeams(id) {
  const g = getGame(id);
  g.teamA = document.getElementById('teamA-'+id)?.value || 'Team A';
  g.teamB = document.getElementById('teamB-'+id)?.value || 'Team B';
  const slA = document.getElementById('slabelA-'+id);
  const slB = document.getElementById('slabelB-'+id);
  if(slA) slA.textContent = g.teamA;
  if(slB) slB.textContent = g.teamB;
  autoTabName(id);
}

function renderPairs(id) {
  const g = getGame(id);
  ['col','row'].forEach(axis => {
    const order = axis==='col' ? g.colOrder : g.rowOrder;
    const el = document.getElementById(axis+'Pairs-'+id);
    if(el) el.innerHTML = order.map(i=>`<div class="pair-chip">${pairLabel(BASE_PAIRS[i])}</div>`).join('');
  });
}

function randomizeNums(id) {
  const g = getGame(id);
  g.colOrder = shuffle([0,1,2,3,4]);
  g.rowOrder = shuffle([0,1,2,3,4]);
  renderPairs(id);
  renderGrid(id);
}

function resetNums(id) {
  const g = getGame(id);
  g.colOrder = [0,1,2,3,4];
  g.rowOrder = [0,1,2,3,4];
  renderPairs(id);
  renderGrid(id);
}

function addPlayer(id) {
  const g = getGame(id);
  const inp = document.getElementById('newname-'+id);
  const name = inp?.value.trim();
  if(!name) return;
  g.players.push(name);
  inp.value = '';
  renderPlayersList(id);
}

function removePlayer(id, idx) {
  const g = getGame(id);
  g.players.splice(idx,1);
  renderPlayersList(id);
}

function clearPlayers(id) {
  if(!confirm('Remove all players?')) return;
  getGame(id).players = [];
  renderPlayersList(id);
}

function renderPlayersList(id) {
  const g = getGame(id);
  const el = document.getElementById('playersList-'+id);
  if(el) el.innerHTML = g.players.map((n,i)=>`<span class="name-tag">${escHtml(n)}<button onclick="removePlayer(${id},${i})">✕</button></span>`).join('');
  const cnt = document.getElementById('sqCount-'+id);
  const assigned = g.grid.flat().filter(x=>x).length;
  if(cnt) cnt.textContent = `25 squares · ${assigned} assigned · ${g.players.length} players`;
}

function autoFill(id) {
  const g = getGame(id);
  if(!g.players.length) { alert('Add players first!'); return; }
  const empties = [];
  for(let r=0;r<5;r++) for(let c=0;c<5;c++) if(!g.grid[r][c]) empties.push([r,c]);
  shuffle(empties).forEach(([r,c],i) => { g.grid[r][c] = g.players[i % g.players.length]; });
  renderPlayersList(id);
  renderGrid(id);
}

function clearGrid(id) {
  if(!confirm('Clear all names from grid?')) return;
  const g = getGame(id);
  g.grid = Array(5).fill(null).map(()=>Array(5).fill(''));
  renderGrid(id);
  renderPlayersList(id);
}

// ════════════════════════════════════════════════
//  GRID RENDER
// ════════════════════════════════════════════════
function renderGrid(id) {
  const g = getGame(id);
  const wrap = document.getElementById('gridwrap-'+id);
  if(!wrap) return;
  wrap.innerHTML = '';

  // Team A label row
  const labelRow = document.createElement('div');
  labelRow.className = 'grid-row';
  const sp = document.createElement('div'); sp.style.cssText='width:110px;flex-shrink:0;';
  labelRow.appendChild(sp);
  const tAlbl = document.createElement('div');
  tAlbl.className='team-lbl-row'; tAlbl.style.cssText='width:500px;';
  tAlbl.textContent = g.teamA + '  →';
  labelRow.appendChild(tAlbl);
  wrap.appendChild(labelRow);

  // Col header row
  const colRow = document.createElement('div'); colRow.className='grid-row';
  const corner = document.createElement('div'); corner.className='gc-corner';
  corner.innerHTML=`<span style="font-size:0.6rem;color:var(--text-dim);text-align:right;line-height:1.6;">↓ ${escHtml(g.teamB)}<br>→ ${escHtml(g.teamA)}</span>`;
  colRow.appendChild(corner);
  for(let c=0;c<5;c++){
    const p=colPair(g,c), d=document.createElement('div');
    d.className='gc-col';
    d.innerHTML=`<span class="pm">${p[0]}<span style="color:var(--text-dim);font-size:0.78rem;"> / </span>${p[1]}</span><span class="ps">last digit</span>`;
    colRow.appendChild(d);
  }
  wrap.appendChild(colRow);

  // Body
  for(let r=0;r<5;r++){
    const row=document.createElement('div'); row.className='grid-row';
    const rh=document.createElement('div'); rh.className='gc-row';
    const rp=rowPair(g,r);
    rh.innerHTML=`<span class="pm">${rp[0]}<span style="color:var(--text-dim);font-size:0.78rem;"> / </span>${rp[1]}</span><span class="ps">last digit</span>`;
    row.appendChild(rh);
    for(let c=0;c<5;c++){
      const sq=document.createElement('div'); sq.className='sq';
      const name=g.grid[r][c];
      if(name){sq.classList.add('taken'); sq.textContent=name;}
      const cp=colPair(g,c), rpp=rowPair(g,r);
      let isWin=false, isPrev=false;
      g.results.forEach((res,idx)=>{
        if(cp.includes(res.digitA)&&rpp.includes(res.digitB)){
          if(idx===g.results.length-1) isWin=true; else isPrev=true;
        }
      });
      if(isWin){sq.classList.add('winner');sq.innerHTML+='<span class="sq-trophy">🏆</span>';}
      else if(isPrev){sq.classList.add('prev-winner');sq.innerHTML+='<span class="sq-trophy">✓</span>';}
      sq.addEventListener('click',()=>clickSquare(id,r,c));
      row.appendChild(sq);
    }
    wrap.appendChild(row);
  }
}

function clickSquare(id,r,c) {
  const g = getGame(id);
  const name = g.grid[r][c];
  if(name){ if(confirm(`Clear "${name}"?`)){ g.grid[r][c]=''; renderGrid(id); renderPlayersList(id); } return; }
  if(!g.players.length){ alert('Add players in Setup first!'); return; }
  pendingSquare={id,r,c};
  const cp=colPair(g,c), rp=rowPair(g,r);
  document.getElementById('modalCoords').textContent=`Col: ${pairLabel(cp)} (${g.teamA})  ·  Row: ${pairLabel(rp)} (${g.teamB})`;
  const sel=document.getElementById('modalSelect');
  sel.innerHTML=g.players.map(n=>`<option value="${escHtml(n)}">${escHtml(n)}</option>`).join('');
  document.getElementById('assignModal').style.display='flex';
}

function closeModal(e){ document.getElementById('assignModal').style.display='none'; }

function confirmAssign(){
  if(!pendingSquare) return;
  const {id,r,c}=pendingSquare;
  getGame(id).grid[r][c]=document.getElementById('modalSelect').value;
  document.getElementById('assignModal').style.display='none';
  pendingSquare=null;
  renderGrid(id); renderPlayersList(id);
}

function refreshScoreUI(id) {
  const g = getGame(id);
  const sl = document.getElementById('lockbtn-'+id);
  if(sl) sl.textContent=`🔒 Lock ${Q_LABELS[g.currentQuarter]}`;
  const slA=document.getElementById('slabelA-'+id); if(slA) slA.textContent=g.teamA;
  const slB=document.getElementById('slabelB-'+id); if(slB) slB.textContent=g.teamB;
  // mark done quarters
  [1,2,3,4].forEach(q=>{
    const btn=document.getElementById(`qbtn-${id}-${q}`);
    if(!btn) return;
    btn.classList.remove('active','done');
    if(q===g.currentQuarter) btn.classList.add('active');
    if(g.results.find(r=>r.quarter===q)) btn.classList.add('done');
  });
  onScoreInput(id);
}

function setQuarter(id, q) {
  const g = getGame(id);
  g.currentQuarter = q;
  [1,2,3,4].forEach(qq=>{
    const btn=document.getElementById(`qbtn-${id}-${qq}`);
    if(!btn) return;
    btn.classList.remove('active');
    if(qq===q) btn.classList.add('active');
  });
  const sl=document.getElementById('lockbtn-'+id);
  if(sl) sl.textContent=`🔒 Lock ${Q_LABELS[q]}`;
  onScoreInput(id);
}

function adjScore(id, team, delta) {
  const el=document.getElementById(`score${team}-${id}`);
  if(el){ el.value=Math.max(0,(parseInt(el.value)||0)+delta); onScoreInput(id); }
}

function onScoreInput(id) {
  const g=getGame(id);
  const a=parseInt(document.getElementById(`scoreA-${id}`)?.value)||0;
  const b=parseInt(document.getElementById(`scoreB-${id}`)?.value)||0;
  const ad=a%10, bd=b%10;
  let matchR=-1,matchC=-1,winner='';
  for(let r=0;r<5;r++) for(let c=0;c<5;c++){
    if(colPair(g,c).includes(ad)&&rowPair(g,r).includes(bd)){matchR=r;matchC=c;winner=g.grid[r][c]||'(empty)';}
  }
  const box=document.getElementById('livebox-'+id);
  if(!box) return;
  if(matchR>=0){
    const cp=colPair(g,matchC),rp=rowPair(g,matchR);
    const col=winner==='(empty)'?'var(--text-dim)':'var(--win)';
    box.innerHTML=`<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <div><div style="font-size:0.68rem;color:var(--text-dim);">Last digits</div><div style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--gold);">${ad} / ${bd}</div></div>
      <div style="color:var(--text-dim);">→</div>
      <div><div style="font-size:0.68rem;color:var(--text-dim);">Square</div><div style="font-family:'Bebas Neue',sans-serif;font-size:0.9rem;">${pairLabel(cp)} · ${pairLabel(rp)}</div></div>
      <div style="color:var(--text-dim);">→</div>
      <div><div style="font-size:0.68rem;color:var(--text-dim);">Winner</div><div style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:${col};">${winner}</div></div>
    </div>`;
  } else {
    box.textContent='Enter scores above to see the matching square.';
  }
  const info=document.getElementById('sinfo-'+id);
  if(info) {
    const locked=g.results.find(r=>r.quarter===g.currentQuarter);
    info.textContent=locked?`${Q_LABELS[g.currentQuarter]} locked · Winner: ${locked.winnerName||'(empty)'}`:`Set scores and lock ${Q_LABELS[g.currentQuarter]}.`;
    const dot=document.getElementById('sdot-'+id);
    if(dot) dot.className='status-dot'+(locked?' green':'');
  }
}

function lockQuarter(id) {
  const g=getGame(id);
  const a=parseInt(document.getElementById(`scoreA-${id}`)?.value)||0;
  const b=parseInt(document.getElementById(`scoreB-${id}`)?.value)||0;
  const ad=a%10, bd=b%10;
  let winner='';
  for(let r=0;r<5;r++) for(let c=0;c<5;c++){
    if(colPair(g,c).includes(ad)&&rowPair(g,r).includes(bd)) winner=g.grid[r][c]||'';
  }
  g.results=g.results.filter(r=>r.quarter!==g.currentQuarter);
  g.results.push({quarter:g.currentQuarter,scoreA:a,scoreB:b,digitA:ad,digitB:bd,winnerName:winner});
  const qbtn=document.getElementById(`qbtn-${id}-${g.currentQuarter}`);
  if(qbtn){qbtn.classList.remove('active');qbtn.classList.add('done');}
  // Show banner
  const banner=document.getElementById('winnerbanner-'+id);
  if(banner){banner.classList.add('show');}
  const wn=document.getElementById('wname-'+id); if(wn) wn.textContent=winner||'(Empty Square)';
  const wd=document.getElementById('wdetails-'+id); if(wd) wd.textContent=`${Q_LABELS[g.currentQuarter]} · ${g.teamA} ${a} – ${g.teamB} ${b} · Digits: ${ad}/${bd}`;
  renderGrid(id);
  renderHistory(id);
  if(g.currentQuarter<4) setQuarter(id, g.currentQuarter+1);
  refreshScoreUI(id);
}

// ════════════════════════════════════════════════
//  HISTORY
// ════════════════════════════════════════════════
function renderHistory(id) {
  const g=getGame(id);
  const el=document.getElementById('histcontent-'+id);
  if(!el) return;
  if(!g.results.length){el.innerHTML='<p style="color:var(--text-dim);font-size:0.87rem;">No results yet.</p>';return;}
  el.innerHTML=`<table class="history-table">
    <thead><tr><th>Quarter</th><th>${escHtml(g.teamA)}</th><th>${escHtml(g.teamB)}</th><th>Digits</th><th>Winner</th></tr></thead>
    <tbody>${[...g.results].sort((a,b)=>a.quarter-b.quarter).map(r=>`<tr>
      <td><span class="badge badge-orange">${Q_LABELS[r.quarter]}</span></td>
      <td style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;">${r.scoreA}</td>
      <td style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;">${r.scoreB}</td>
      <td><span class="badge badge-gold">${r.digitA} / ${r.digitB}</span></td>
      <td>${r.winnerName?`<span class="badge badge-green">🏆 ${escHtml(r.winnerName)}</span>`:'<span style="color:var(--text-dim);">Empty</span>'}</td>
    </tr>`).join('')}</tbody></table>`;
}

// ════════════════════════════════════════════════
//  SCORE BOT
// ════════════════════════════════════════════════
function setBotInterval(id, mins) {
  const g=getGame(id);
  g.botIntervalMins=mins;
  if(g.botRunning) restartBotTimer(id);
}

function toggleBot(id) {
  const g=getGame(id);
  if(g.botRunning) stopBot(id); else startBot(id);
}

function startBot(id) {
  const g=getGame(id);
  const inp=document.getElementById('botq-'+id);
  if(inp) g.botQuery=inp.value.trim();
  if(!g.botQuery){alert('Enter a game to track first.');return;}
  if('Notification' in window && Notification.permission==='default') Notification.requestPermission();
  g.botRunning=true;
  updateBotUI(id);
  runBotNow(id);
}

function stopBot(id) {
  const g=getGame(id);
  g.botRunning=false;
  clearTimeout(g.botIntervalTimer);
  clearInterval(g.botCountdownTimer);
  g.botIntervalTimer=null; g.botCountdownTimer=null;
  updateBotUI(id);
  setBotStatus(id,'Bot stopped','var(--text-dim)');
  const cd=document.getElementById('botcountdown-'+id); if(cd) cd.textContent='';
}

function updateBotUI(id) {
  const g=getGame(id);
  const btn=document.getElementById('botbtn-'+id);
  const now=document.getElementById('botnow-'+id);
  if(btn){btn.textContent=g.botRunning?'■ Stop':'▶ Start';btn.className=`btn btn-sm ${g.botRunning?'btn-ghost':'btn-primary'}`;}
  if(now) now.style.display=g.botRunning?'':'none';
}

function setBotStatus(id, txt, color) {
  const el=document.getElementById('botstatus-'+id);
  if(el){el.textContent=txt;el.style.color=color||'var(--text-dim)';}
  // update global top bar
  const running=games.filter(g=>g.botRunning).map(g=>g.name);
  const bar=document.getElementById('globalBotStatus');
  if(bar) bar.textContent=running.length?`🤖 Tracking: ${running.join(', ')}`:'';
}

function restartBotTimer(id) {
  const g=getGame(id);
  clearTimeout(g.botIntervalTimer);
  clearInterval(g.botCountdownTimer);
  g.secondsLeft=g.botIntervalMins*60;
  tickBotCountdown(id);
  g.botCountdownTimer=setInterval(()=>{
    g.secondsLeft--;
    tickBotCountdown(id);
    if(g.secondsLeft<=0) clearInterval(g.botCountdownTimer);
  },1000);
  g.botIntervalTimer=setTimeout(()=>{if(g.botRunning) runBotNow(id);},g.botIntervalMins*60*1000);
}

function tickBotCountdown(id) {
  const g=getGame(id);
  const m=Math.floor((g.secondsLeft||0)/60), s=(g.secondsLeft||0)%60;
  const el=document.getElementById('botcountdown-'+id);
  if(el) el.textContent=`Next: ${m}:${String(s).padStart(2,'0')}`;
}

async function runBotNow(id) {
  const g=getGame(id);
  if(!g||!g.botRunning) return;
  const inp=document.getElementById('botq-'+id);
  if(inp) g.botQuery=inp.value.trim();
  if(!g.botQuery) return;
  setBotStatus(id,'Searching...','var(--gold)');
  try {
    const result=await fetchScore(g.botQuery);
    handleBotResult(id,result);
    setBotStatus(id,`Updated ${new Date().toLocaleTimeString()}`, 'var(--win)');
  } catch(e) {
    setBotStatus(id,'Search failed — will retry','#e57373');
    console.warn('Bot error:',e);
  }
  if(g.botRunning) restartBotTimer(id);
}

async function fetchScore(query) {
  const sys=`You are a sports score bot. Search for the CURRENT live or most recent score of the game requested.
Return ONLY a JSON object, no markdown, no explanation.
{
  "teamA": "Away team",
  "teamB": "Home team",
  "scoreA": 104,
  "scoreB": 98,
  "period": "Q3",
  "clock": "4:32",
  "status": "in progress",
  "summary": "One line summary"
}
status must be exactly one of: "not started","in progress","halftime","end of q1","end of q2","end of q3","final"
Return ONLY valid JSON.`;
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:800,
      tools:[{type:'web_search_20250305',name:'web_search'}],
      system:sys,
      messages:[{role:'user',content:`Current score: ${query}`}]
    })
  });
  const data=await resp.json();
  const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
  const clean=text.replace(/```json|```/g,'').trim();
  const s=clean.indexOf('{'),e=clean.lastIndexOf('}');
  if(s===-1||e===-1) throw new Error('No JSON: '+clean.slice(0,150));
  return JSON.parse(clean.slice(s,e+1));
}

function handleBotResult(id, res) {
  const g=getGame(id);
  const {teamA,teamB,scoreA,scoreB,period,clock,status,summary}=res;

  // Show result card
  const card=document.getElementById('botresult-'+id); if(card) card.style.display='block';
  const lbl=document.getElementById('botlabel-'+id); if(lbl) lbl.textContent=`${teamA} vs ${teamB}`;
  const scr=document.getElementById('botscore-'+id); if(scr) scr.textContent=`${scoreA} – ${scoreB}`;
  const per=document.getElementById('botperiod-'+id); if(per) per.textContent=`${period||''}${clock?' · '+clock:''} · ${summary||status}`;

  // Winner preview
  const ad=scoreA%10, bd=scoreB%10;
  let winner='';
  for(let r=0;r<5;r++) for(let c=0;c<5;c++){
    if(colPair(g,c).includes(ad)&&rowPair(g,r).includes(bd)) winner=g.grid[r][c]||'(empty)';
  }
  const mt=document.getElementById('botmatch-'+id);
  if(mt) mt.innerHTML=winner
    ?`<span style="color:var(--win);font-weight:600;">Current winner: ${escHtml(winner)}</span>`
    :`<span style="color:var(--text-dim);">Digits ${ad}/${bd}</span>`;

  // Auto-detect quarter end and inject score
  const stLow=(status||'').toLowerCase();
  const periodKey=stLow+scoreA+scoreB;
  const checkpoints={'end of q1':1,'end of q2':2,'halftime':2,'end of q3':3,'final':4};
  const matched=Object.entries(checkpoints).find(([k])=>stLow.includes(k));

  if(matched && periodKey!==g.botLastPeriodKey) {
    g.botLastPeriodKey=periodKey;
    const squareQ=matched[1];
    // Only auto-inject if this quarter hasn't been locked yet
    if(!g.results.find(r=>r.quarter===squareQ)) {
      // Set score inputs
      const saEl=document.getElementById(`scoreA-${id}`); if(saEl) saEl.value=scoreA;
      const sbEl=document.getElementById(`scoreB-${id}`); if(sbEl) sbEl.value=scoreB;
      setQuarter(id,squareQ);
      onScoreInput(id);
      // Switch to scores tab to show it
      switchInnerTab(id,'scores');
      // Notification
      sendNotif(`🏀 ${g.name} — ${Q_LABELS[squareQ]} Over!`,`${teamA} ${scoreA} – ${teamB} ${scoreB}\nWinner: ${winner||'(empty)'}`);
      showToast(g.name, Q_LABELS[squareQ], scoreA, scoreB, winner);
    }
  }
}

function useThisScore(id) {
  const scr=document.getElementById('botscore-'+id);
  if(!scr) return;
  const parts=scr.textContent.split('–').map(s=>s.trim());
  if(parts.length===2){
    const saEl=document.getElementById(`scoreA-${id}`); if(saEl) saEl.value=parseInt(parts[0])||0;
    const sbEl=document.getElementById(`scoreB-${id}`); if(sbEl) sbEl.value=parseInt(parts[1])||0;
    onScoreInput(id);
  }
}

function sendNotif(title,body){
  if('Notification' in window && Notification.permission==='granted') new Notification(title,{body});
}

function showToast(gameName, label, sA, sB, winner) {
  const t=document.getElementById('botToast');
  t.innerHTML=`
    <div style="font-size:0.75rem;color:#90c490;margin-bottom:2px;">${escHtml(gameName)}</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--win);letter-spacing:2px;">🏀 ${label} Over!</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--gold);margin:3px 0;">${sA} – ${sB}</div>
    ${winner?`<div style="font-size:0.85rem;color:#a0e0a0;">Winner: <strong>${escHtml(winner)}</strong></div>`:''}
    <div style="font-size:0.7rem;color:var(--text-dim);margin-top:5px;">Score auto-filled · Click Lock to save</div>`;
  t.style.opacity='1'; t.style.display='block';
  clearTimeout(t._t);
  t._t=setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.style.display='none',500);},10000);
}
